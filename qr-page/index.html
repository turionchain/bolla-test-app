<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HazClub 🍁 — Dev Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #fff; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .qr-container {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .qr-container svg {
      display: block;
      width: 260px;
      height: 260px;
    }
    .url-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: monospace;
      font-size: 12px;
      color: #4fc3f7;
      word-break: break-all;
      margin-bottom: 24px;
    }
    .instructions {
      text-align: left;
      font-size: 13px;
      color: #aaa;
      line-height: 1.8;
    }
    .instructions strong { color: #fff; }
    .step { margin-bottom: 8px; }
    .open-btn {
      display: block;
      background: #4fc3f7;
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 24px;
      border-radius: 10px;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .open-btn:active { background: #039be5; }
    .badge {
      display: inline-block;
      background: #1b5e20;
      color: #4caf50;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      margin-top: 16px;
    }
  </style>
</head>
